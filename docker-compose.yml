services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: livraisons_db
      MYSQL_USER: user
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # 👇 LIGNE MAGIQUE POUR LA BASE DE DONNÉES 👇
      # - ./database.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
